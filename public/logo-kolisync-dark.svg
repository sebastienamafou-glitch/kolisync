<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" width="680" height="420">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0C96A"/>
      <stop offset="50%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#A07820"/>
    </linearGradient>
    <linearGradient id="goldH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F0C96A"/>
      <stop offset="100%" stop-color="#A07820"/>
    </linearGradient>
    <linearGradient id="nightBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1017"/>
      <stop offset="100%" stop-color="#080A0E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="20" y="20" width="640" height="380" rx="24" fill="url(#nightBg)"/>
  <rect x="20" y="20" width="640" height="380" rx="24" fill="none" stroke="#D4A843" stroke-width="0.8" opacity="0.3"/>

  <!-- Outer hexagon -->
  <polygon points="220,68 262,91 262,137 220,160 178,137 178,91"
           fill="none" stroke="url(#gold)" stroke-width="1.8" opacity="0.4"/>

  <!-- Inner hexagon -->
  <polygon points="220,84 250,101 250,135 220,152 190,135 190,101"
           fill="#111620" stroke="url(#gold)" stroke-width="1"/>

  <!-- K vertical bar -->
  <rect x="204" y="100" width="6" height="40" rx="1.5" fill="url(#gold)"/>

  <!-- K top diagonal -->
  <path d="M210 120 L228 100" fill="none" stroke="url(#gold)" stroke-width="6" stroke-linecap="round"/>

  <!-- K bottom diagonal -->
  <path d="M210 120 L228 140" fill="none" stroke="url(#gold)" stroke-width="6" stroke-linecap="round"/>

  <!-- Zap accent -->
  <path d="M232 108 L224 120 L232 120 L222 134" fill="none" stroke="#F0C96A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- Orbit arcs -->
  <path d="M248 86 A44 44 0 0 1 264 114" fill="none" stroke="url(#gold)" stroke-width="1" stroke-dasharray="3 4" opacity="0.5"/>
  <path d="M176 126 A44 44 0 0 1 192 154" fill="none" stroke="url(#gold)" stroke-width="1" stroke-dasharray="3 4" opacity="0.5"/>
  <circle cx="249" cy="85" r="2.5" fill="#D4A843" opacity="0.7"/>
  <circle cx="191" cy="155" r="2.5" fill="#D4A843" opacity="0.5"/>

  <!-- Wordmark KOLI -->
  <text x="298" y="130"
        font-family="'Clash Display', Georgia, serif"
        font-size="52" font-weight="700" letter-spacing="-1"
        fill="url(#goldH)">KOLI</text>

  <!-- Wordmark SYNC -->
  <text x="412" y="130"
        font-family="'Clash Display', Georgia, serif"
        font-size="52" font-weight="500" letter-spacing="-1"
        fill="#ffffff" opacity="0.9">SYNC</text>

  <!-- Tagline -->
  <text x="298" y="155"
        font-family="'Plus Jakarta Sans', 'Helvetica Neue', sans-serif"
        font-size="11" font-weight="500" letter-spacing="3"
        fill="#D4A843" opacity="0.6">LOGISTIQUE TRANSPARENTE</text>

  <!-- Underline -->
  <line x1="298" y1="163" x2="570" y2="163" stroke="url(#goldH)" stroke-width="0.6" opacity="0.35"/>

  <!-- Country badge -->
  <rect x="270" y="290" width="140" height="28" rx="14"
        fill="#D4A843" fill-opacity="0.08"
        stroke="#D4A843" stroke-width="0.7" stroke-opacity="0.3"/>
  <text x="340" y="309"
        font-family="'Plus Jakarta Sans', 'Helvetica Neue', sans-serif"
        font-size="11" font-weight="600" letter-spacing="2.5"
        text-anchor="middle" fill="#D4A843" opacity="0.7">CÔTE D'IVOIRE</text>

  <!-- Corner dots -->
  <circle cx="48"  cy="48"  r="2" fill="#D4A843" opacity="0.25"/>
  <circle cx="632" cy="48"  r="2" fill="#D4A843" opacity="0.25"/>
  <circle cx="48"  cy="372" r="2" fill="#D4A843" opacity="0.25"/>
  <circle cx="632" cy="372" r="2" fill="#D4A843" opacity="0.25"/>
</svg>
