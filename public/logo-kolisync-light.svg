<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 200" width="680" height="200">
  <defs>
    <linearGradient id="goldL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C49020"/>
      <stop offset="100%" stop-color="#8A6010"/>
    </linearGradient>
    <linearGradient id="goldHL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C49020"/>
      <stop offset="100%" stop-color="#8A6010"/>
    </linearGradient>
  </defs>

  <!-- Outer hexagon -->
  <polygon points="100,28 134,47 134,85 100,104 66,85 66,47"
           fill="none" stroke="url(#goldL)" stroke-width="1.6" opacity="0.35"/>

  <!-- Inner hexagon -->
  <polygon points="100,41 122,54 122,80 100,93 78,80 78,54"
           fill="#F5F0E8" stroke="url(#goldL)" stroke-width="1"/>

  <!-- K vertical bar -->
  <rect x="87" y="57" width="5.5" height="30" rx="1.2" fill="url(#goldL)"/>

  <!-- K top diagonal -->
  <path d="M92.5 72 L107 57" fill="none" stroke="url(#goldL)" stroke-width="5.5" stroke-linecap="round"/>

  <!-- K bottom diagonal -->
  <path d="M92.5 72 L107 87" fill="none" stroke="url(#goldL)" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Zap accent -->
  <path d="M110 63 L104 72 L110 72 L103 82" fill="none" stroke="#C49020" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>

  <!-- Orbit arcs -->
  <path d="M128 36 A38 38 0 0 1 142 60" fill="none" stroke="url(#goldL)" stroke-width="1" stroke-dasharray="3 4" opacity="0.4"/>
  <path d="M58 80 A38 38 0 0 1 72 104" fill="none" stroke="url(#goldL)" stroke-width="1" stroke-dasharray="3 4" opacity="0.4"/>
  <circle cx="129" cy="35" r="2.2" fill="#C49020" opacity="0.6"/>
  <circle cx="71"  cy="105" r="2.2" fill="#C49020" opacity="0.4"/>

  <!-- Wordmark KOLI -->
  <text x="162" y="82"
        font-family="'Clash Display', Georgia, serif"
        font-size="46" font-weight="700" letter-spacing="-1"
        fill="url(#goldHL)">KOLI</text>

  <!-- Wordmark SYNC -->
  <text x="264" y="82"
        font-family="'Clash Display', Georgia, serif"
        font-size="46" font-weight="500" letter-spacing="-1"
        fill="#0D1017">SYNC</text>

  <!-- Tagline -->
  <text x="162" y="104"
        font-family="'Plus Jakarta Sans', 'Helvetica Neue', sans-serif"
        font-size="10" font-weight="600" letter-spacing="3"
        fill="#C49020" opacity="0.7">LOGISTIQUE TRANSPARENTE</text>

  <!-- Underline -->
  <line x1="162" y1="110" x2="420" y2="110" stroke="url(#goldHL)" stroke-width="0.5" opacity="0.3"/>
</svg>
